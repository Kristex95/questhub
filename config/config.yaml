env: "local"

app:
  shutdown_timeout: "15s"

http:
  host: localhost
  port: 8080

postgres:
  host: localhost
  port: 5433
  user: postgres
  password: postgres
  dbname: questhub
  sslmode: disable
  max_conns: 25

redis:
  addr: "localhost:6380"
  password: ""
  db: 0

cache:
  quest_ttl: "60s"
  
grpc:
  notification_addr: "localhost:50051"

logging:
  file: "./logs/questhub.log"
  level: "info"
  format: "ecs"

observability:
  otlp_endpoint: "localhost:4317"
  service_name: "questhub"